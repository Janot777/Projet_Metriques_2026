<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Atelier Métriques</title>

  <style>
    :root {
      --bg: #0a1410;
      --bg-soft: #11201a;
      --accent: #34d399;
      --accent-strong: #10b981;
      --text: #e2f4ec;
      --muted: #94a89c;
      --danger: #f87171;
      --ok: #6ee7b7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse at top left, #05966933 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, #14532d33 0%, transparent 50%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: var(--bg-soft);
      border: 1px solid #1f3a2a;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.5);
    }

    .card header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .card header .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.3);
    }

    h1 {
      margin: 0;
      font-size: 1.6rem;
    }

    .lead {
      margin: 4px 0 24px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    nav {
      margin-bottom: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 0.9rem;
    }

    nav a {
      color: var(--accent);
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #1f3a2a;
      transition: background 0.15s ease;
    }

    nav a:hover {
      background: #1f3a2a;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    label {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    input, textarea {
      font: inherit;
      color: var(--text);
      background: #081410;
      border: 1px solid #1f3a2a;
      border-radius: 10px;
      padding: 10px 12px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.3);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      justify-self: start;
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      background: var(--accent-strong);
      color: #081410;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.05s ease, background 0.15s ease;
    }

    button:hover { background: var(--accent); }
    button:active { transform: translateY(1px); }

    .feedback {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }

    .feedback.ok {
      background: rgba(52, 211, 153, 0.12);
      border: 1px solid rgba(52, 211, 153, 0.4);
      color: var(--ok);
    }

    .footnote {
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    @media (max-width: 520px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 24px; }
    }
  </style>
</head>

<body>
  <main class="card">
    <header>
      <span class="dot" aria-hidden="true"></span>
      <h1>Ma page de contact</h1>
    </header>
    <p class="lead">Une question, un retour sur l'atelier métriques ? Laissez-moi un message.</p>

    <nav>
      <a href="/">Accueil</a>
      <a href="/rapport">Graphique Paris</a>
      <a href="/histogramme">Histogramme</a>
      <a href="/atelier">Atelier</a>
    </nav>

    <form id="contact-form" novalidate>
      <div class="row">
        <div class="field">
          <label for="prenom">Prénom</label>
          <input id="prenom" name="prenom" type="text" autocomplete="given-name" required />
        </div>
        <div class="field">
          <label for="nom">Nom</label>
          <input id="nom" name="nom" type="text" autocomplete="family-name" required />
        </div>
      </div>

      <div class="field">
        <label for="email">Email (optionnel)</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="vous@example.com" />
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" required placeholder="Votre message..."></textarea>
      </div>

      <button type="submit">Envoyer</button>

      <div class="feedback ok" id="feedback" role="status" aria-live="polite"></div>
    </form>

    <p class="footnote">Aucune base de données n'est branchée à ce formulaire — la soumission reste locale (cf. consignes Exercice 6).</p>
  </main>

  <script>
    const form = document.getElementById('contact-form');
    const feedback = document.getElementById('feedback');

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const prenom = form.prenom.value.trim();
      const nom = form.nom.value.trim();
      const message = form.message.value.trim();

      if (!prenom || !nom || !message) {
        feedback.textContent = "Merci de remplir au minimum prénom, nom et message.";
        feedback.classList.remove('ok');
        feedback.style.display = 'block';
        feedback.style.color = 'var(--danger)';
        return;
      }

      feedback.style.color = '';
      feedback.classList.add('ok');
      feedback.textContent = `Merci ${prenom} ! Votre message a bien été reçu (côté front uniquement).`;
      feedback.style.display = 'block';
      form.reset();
    });
  </script>
</body>
</html>
